# ============================================================
#  ci.yml — Integración Continua
#
#  Disparadores:
#    - Push a cualquier rama de trabajo:
#        feat/*, fix/*, hotfix/*, revert/*,
#        refactor/*, release/*, chore/*
#    - Pull Requests apuntando a dev, stg, preprod o main
#
#  NO incrementa versiones. Solo valida que el código
#  esté en buen estado antes de integrarse.
#
#  Regla de título de PR — varía según la rama destino:
#
#    → dev, stg, preprod:
#         Acepta: feat, fix, chore, refactor, revert
#         Rechaza: release, hotfix
#         (son ambientes de desarrollo y pruebas, no de release)
#
#    → main:
#         Acepta ÚNICAMENTE: release, hotfix
#         (solo se llega a main con un release formal o emergencia)
#
#  Ramas del proyecto:
#    dev     → Integración (desarrollo activo)
#    stg     → Staging / Pruebas QA
#    preprod → Pre-Producción / Validación final (UAT)
#    main    → Producción (fuente de verdad)
# ============================================================

name: CI — Validar Rama y PR

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "hotfix/**"
      - "revert/**"
      - "refactor/**"
      - "release/**"
      - "chore/**"
  pull_request:
    branches:
      - dev
      - stg
      - preprod
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  # ----------------------------------------------------------
  # Job 0: Validar título del PR
  # Corre ÚNICAMENTE en eventos de pull_request.
  # Las reglas de prefijos válidos cambian según la rama destino.
  # ----------------------------------------------------------
  validar-titulo-pr:
    name: Validar Título del PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Verificar formato del título
        uses: actions/github-script@v7
        with:
          script: |
            const titulo       = context.payload.pull_request.title;
            const ramaOrigen   = context.payload.pull_request.head.ref;
            const ramaDestino  = context.payload.pull_request.base.ref;

            // ----------------------------------------------------------------
            // Prefijos permitidos y bloqueados según rama destino
            // ----------------------------------------------------------------
            const reglasDeDestino = {
              // dev, stg y preprod son ambientes de trabajo y pruebas.
              // Nunca se hace un "release" formal en ellos — solo en main.
              dev:     { permitidos: ['feat', 'fix', 'chore', 'refactor', 'revert'], bloqueados: ['release', 'hotfix'] },
              stg:     { permitidos: ['feat', 'fix', 'chore', 'refactor', 'revert'], bloqueados: ['release', 'hotfix'] },
              preprod: { permitidos: ['feat', 'fix', 'chore', 'refactor', 'revert'], bloqueados: ['release', 'hotfix'] },
              // main es producción: solo se llega con un release formal o un hotfix de emergencia.
              main:    { permitidos: ['release', 'hotfix'], bloqueados: [] },
            };

            const regla = reglasDeDestino[ramaDestino];

            // Rama destino desconocida — no aplicar validación
            if (!regla) {
              console.log(`Rama destino "${ramaDestino}" no requiere validación de título.`);
              return;
            }

            // Expresión regular: el título debe empezar con "prefijo: " (dos puntos y espacio)
            const regex    = new RegExp(`^(${regla.permitidos.join('|')}): .+`);
            const esValido = regex.test(titulo);

            // ----------------------------------------------------------------
            // Caso exitoso
            // ----------------------------------------------------------------
            if (esValido) {
              const prefijoDetectado = titulo.split(':')[0];
              console.log(`✅ Título válido: "${titulo}"`);
              await core.summary
                .addHeading('✅ Título del PR válido', 3)
                .addTable([
                  [{data: 'Campo',             header: true}, {data: 'Valor',                   header: true}],
                  ['Título',                   titulo],
                  ['Prefijo detectado',        `\`${prefijoDetectado}\``],
                  ['Rama origen',              `\`${ramaOrigen}\``],
                  ['Rama destino',             `\`${ramaDestino}\``],
                ])
                .write();
              return;
            }

            // ----------------------------------------------------------------
            // Caso de error — construir mensaje según la rama destino
            // ----------------------------------------------------------------
            let cuerpoMensaje;

            if (ramaDestino === 'main') {
              // Mensaje específico para main: solo release o hotfix
              cuerpoMensaje = [
                '## ❌ Título de PR inválido para `main`',
                '',
                `El título actual es: **"${titulo}"**`,
                '',
                `Los PRs hacia \`main\` representan un release formal a producción o una corrección`,
                `de emergencia. Por eso, el título **solo puede usar uno de estos dos prefijos**:`,
                '',
                '| Prefijo | Cuándo usarlo | Ejemplo |',
                '|---|---|---|',
                '| `release:` | Promoción normal desde `preprod` | `release: Versión 1.2.0` |',
                '| `hotfix:` | Corrección urgente de emergencia | `hotfix: Timeout en pasarela de pago` |',
                '',
                '### ¿Cómo corregirlo?',
                '1. Haz clic en el lápiz (✏️) junto al título del PR',
                '2. Cambia el título para que comience con `release:` o `hotfix:`',
                '3. Este check se re-ejecutará automáticamente',
                '',
                '> Si tu PR no es un release ni un hotfix, probablemente la rama destino',
                '> incorrecta. Los cambios de desarrollo van a `dev`, no a `main`.',
                '',
                '---',
                `> **Título actual:** \`${titulo}\``,
                `> **Rama origen:** \`${ramaOrigen}\``,
                `> **Rama destino:** \`${ramaDestino}\``,
              ].join('\n');

            } else {
              // Mensaje para dev, stg, preprod
              const ejemplos = regla.permitidos
                .map(p => `  • \`${p}: Descripción del cambio\``)
                .join('\n');

              const bloqueadosFormateados = regla.bloqueados
                .map(p => `\`${p}\``)
                .join(' y ');

              cuerpoMensaje = [
                `## ❌ Título de PR inválido para \`${ramaDestino}\``,
                '',
                `El título actual es: **"${titulo}"**`,
                '',
                `Los prefijos ${bloqueadosFormateados} están reservados para PRs a \`main\` únicamente`,
                `(releases formales y correcciones de emergencia). En \`${ramaDestino}\` se trabaja`,
                `con cambios de desarrollo y pruebas.`,
                '',
                `El título debe comenzar con uno de estos prefijos, seguido de **dos puntos y un espacio**:`,
                '',
                ejemplos,
                '',
                '### ¿Cómo corregirlo?',
                '1. Haz clic en el lápiz (✏️) junto al título del PR',
                '2. Cambia el título para que comience con el prefijo correcto',
                '3. Este check se re-ejecutará automáticamente',
                '',
                '---',
                `> **Título actual:** \`${titulo}\``,
                `> **Rama origen:** \`${ramaOrigen}\``,
                `> **Rama destino:** \`${ramaDestino}\``,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         cuerpoMensaje,
            });

            core.setFailed(
              `Título inválido para "${ramaDestino}": "${titulo}". ` +
              `Prefijos permitidos: ${regla.permitidos.join(', ')}`
            );

  # ----------------------------------------------------------
  # Job 1: Lint + Verificación de tipos
  # Solo corre en PRs a dev o en push a ramas de trabajo.
  # En PRs a stg, preprod y main solo se valida el título.
  # ----------------------------------------------------------
  lint:
    name: Lint y Verificación de Tipos
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'dev')
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar lint y verificación de tipos
        run: echo "Reemplazar con el comando de lint del proyecto"
        # Ejemplos:
        #   Node.js → npm run lint && npm run type-check
        #   Python  → flake8 . && mypy .
        #   Java    → mvn checkstyle:check
        #   .NET    → dotnet format --verify-no-changes

  # ----------------------------------------------------------
  # Job 2: Pruebas Unitarias
  # ----------------------------------------------------------
  pruebas:
    name: Pruebas Unitarias
    runs-on: ubuntu-latest
    needs: lint
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'dev')
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar pruebas unitarias con cobertura
        run: echo "Reemplazar con el comando de pruebas del proyecto"
        # Ejemplos:
        #   Node.js → npm run test:coverage
        #   Python  → pytest --cov=. --cov-report=json
        #   Java    → mvn test jacoco:report
        #   .NET    → dotnet test --collect:"XPlat Code Coverage"

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura
          path: coverage/
          retention-days: 7

      - name: Verificar umbral de cobertura
        run: |
          # Adaptar la lectura del reporte de cobertura según el lenguaje.
          # El umbral mínimo recomendado es 80%.
          # Ejemplos:
          #   Node.js (coverage-summary.json):
          #     COBERTURA=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
          #   Python (coverage.json):
          #     COBERTURA=$(python -c "import json; d=json.load(open('coverage.json')); print(d['totals']['percent_covered'])")
          #   Java / .NET: leer el XML/HTML del reporte con grep o xmllint
          echo "⚠️  Configurar lectura de cobertura según el lenguaje del proyecto"

  # ----------------------------------------------------------
  # Job 3: Verificación de Build
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pruebas
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'dev')
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar build
        run: echo "Reemplazar con el comando de build del proyecto"
        # Ejemplos:
        #   Node.js → npm run build
        #   Python  → python setup.py build
        #   Java    → mvn package
        #   .NET    → dotnet build

      - name: Subir artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ----------------------------------------------------------
  # Comentario de resumen final en el PR
  # Solo corre cuando todos los jobs anteriores aplican y pasan.
  # ----------------------------------------------------------
  resumen-pr:
    name: Comentario de Estado del PR
    runs-on: ubuntu-latest
    needs: [validar-titulo-pr, lint, pruebas, build]
    if: |
      github.event_name == 'pull_request' && github.base_ref == 'dev'
    permissions:
      pull-requests: write
    steps:
      - name: Comentar resultado en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const titulo           = context.payload.pull_request.title;
            const prefijoDetectado = titulo.split(':')[0];
            const ramaDestino      = context.payload.pull_request.base.ref;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: [
                '## ✅ CI Aprobado — Listo para merge',
                '',
                '| Verificación        | Estado        |',
                '|---------------------|---------------|',
                '| Título del PR       | ✅ Válido     |',
                '| Lint y Tipos        | ✅ Aprobado   |',
                '| Pruebas Unitarias   | ✅ Aprobado   |',
                '| Build               | ✅ Aprobado   |',
                '',
                `**Tipo de cambio detectado:** \`${prefijoDetectado}\``,
                '',
                `Esta rama está lista para revisión y merge a \`${ramaDestino}\`.`,
              ].join('\n')
            });
